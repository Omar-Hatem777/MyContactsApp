<div class="container py-5">

    <!-- Header -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">
            <i class="fa fa-address-book me-2"></i> Contact Manager
        </h2>
    </div>

    <!-- Toolbar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="input-group w-50">
            <span class="input-group-text">
                <i class="fa fa-search"></i>
            </span>
            <input type="text" class="form-control" placeholder="Search contacts" />
        </div>
        <button class="btn btn-success">
            <i class="fa fa-user-plus me-2"></i> Add Contact
        </button>
    </div>

    <!-- Contact List -->
    <ul class="list-group">
        <!-- Single contact item -->
        @for (contact of contacts; track contact.id)
        {
        <li class="list-group-item d-flex justify-content-between align-items-center">
            
                <div>
                    <h6 class="mb-1"></h6>
                    <small>
                        <i class="fa-solid fa-circle-user"></i>
                        Name:
                        {{ contact.username }} <!-- Contact User Name -->
                    </small><br />
                    <h6 class="mb-1"></h6>
                    <small>
                        <i class="fa fa-envelope me-1"></i>
                        Email:
                        {{ contact.email }} <!-- Contact Email -->
                    </small><br/>
                    <small>
                        <i class="fa fa-phone me-1"></i> 
                        Phone:
                        {{ contact.phoneNumber }} <!-- Contact Phone Number -->
                    </small><br />
                    <small>
                        <i class="fa-solid fa-calendar"></i>
                        Date Added:
                        {{ contact.dateAdded }} <!-- Contact Date Added -->
                    </small>
                </div>
                <div>
                    <button class="btn btn-sm btn-outline-primary me-2">
                        <i class="fa fa-edit"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            
        </li>
        }@empty {
        <li class="list-group-item text-center">
            <p class="mb-0">No contacts found.</p>
        }
    </ul>

</div>
