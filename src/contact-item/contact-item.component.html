<li class="list-group-item d-flex justify-content-between align-items-center">
  <div>
    <h6 class="mb-1"></h6>
    <small>
      <i class="fa-solid fa-circle-user"></i>
      Name: {{ contact.name }}
    </small><br />
    <h6 class="mb-1"></h6>
    <small>
      <i class="fa fa-envelope me-1"></i>
      Email: {{ contact.email }}
    </small><br />
    <small>
      <i class="fa fa-phone me-1"></i>
      Phone: {{ contact.phone | phoneFormat }}
    </small><br />
    <small>
      <i class="fa-solid fa-calendar"></i>
      Date Added: {{ contact.dateAdded | dateFormat }}
    </small>
  </div>
  <div>
    <button class="btn btn-sm btn-outline-primary me-2" (click)="onEdit()">
      Edit
      <i class="fa fa-edit"></i>
    </button>
    <button class="btn btn-sm btn-outline-danger" (click)="onDeleteClick()">
      Delete
      <i class="fa fa-trash"></i>
    </button>
  </div>

  <!-- Delete Confirmation Dialog -->
  <div *ngIf="showDeleteConfirmation" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center" style="background-color: rgba(0,0,0,0.5); z-index: 1050;">
    <div class="card" style="min-width: 300px;">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0">
          <i class="fa fa-exclamation-triangle me-2"></i>
          Confirm Delete
        </h5>
      </div>
      <div class="card-body">
        <p class="mb-0">Are you sure you want to delete the contact <strong>{{ contact.name }}</strong>?</p>
        <p class="text-muted small mb-0">This action cannot be undone.</p>
      </div>
      <div class="card-footer d-flex justify-content-end gap-2">
        <button class="btn btn-secondary" (click)="cancelDelete()">
          <i class="fa fa-times me-1"></i>
          Cancel
        </button>
        <button class="btn btn-danger" (click)="confirmDelete()">
          <i class="fa fa-trash me-1"></i>
          Delete
        </button>
      </div>
    </div>
  </div>
</li>
